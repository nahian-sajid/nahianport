services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    environment:
      DATABASE_URL: postgresql://app:app@db:5432/appdb
      APP_SECRET: change_me_in_env
      ADMIN_SEED_EMAIL: admin@example.com
      ADMIN_SEED_PASSWORD: Admin123!
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_BYTES: "5242880"
    ports:
      - "3000:3000"
    depends_on:
      - db
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads: